name: Trigger auto deployment for azfunc-light

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/azfunc-light-AutoDeployTrigger-9cdcb507-06e0-49d1-88d8-be40432bf2e5.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZFUNCLIGHT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZFUNCLIGHT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZFUNCLIGHT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: acrav2cebrvpor4k.azurecr.io
          registryUsername: ${{ secrets.AZFUNCLIGHT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZFUNCLIGHT_REGISTRY_PASSWORD }}
          containerAppName: azfunc-light
          resourceGroup: rg-AzUrlShortener-dev
          imageToBuild: acrav2cebrvpor4k.azurecr.io/azfunc-light:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


